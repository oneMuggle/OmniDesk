name: Desktop Notifier CI

on:
  push:
    branches:
      - develop
      - test
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-2019

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r desktop_notifier/requirements.txt
        pip install pytest pytest-qt

    - name: Run tests
      run: |
        cd desktop_notifier
        pytest

  build:
    if: github.ref_name == 'test' || github.ref_name == 'main'
    needs: test
    runs-on: windows-2019

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read version
      id: version
      run: |
        $ver = Get-Content deployment/docker/VERSION | Select-Object -First 1
        Write-Host "Version: $ver"
        echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r desktop_notifier/requirements.txt
        pip install pyinstaller<6.0

    - name: Run PyInstaller
      run: |
        cd desktop_notifier
        pyinstaller main.spec

    - name: Verify build artifact
      run: |
        if (-Not (Test-Path "desktop_notifier\dist\OmniDeskNotifier.exe")) {
          Write-Error "Build artifact OmniDeskNotifier.exe not found!"
          exit 1
        }
        $size = (Get-Item "desktop_notifier\dist\OmniDeskNotifier.exe").Length
        Write-Host "OmniDeskNotifier.exe size: $([math]::Round($size / 1MB, 2)) MB"
      shell: pwsh

    - name: Upload Release Artifact (main)
      if: github.ref_name == 'main'
      uses: actions/upload-artifact@v7
      with:
        name: OmniDeskNotifier-Windows-Release
        path: desktop_notifier/dist/OmniDeskNotifier.exe
        retention-days: 30

    - name: Upload Test Artifact (test)
      if: github.ref_name == 'test'
      uses: actions/upload-artifact@v7
      with:
        name: OmniDeskNotifier-Windows-Test
        path: desktop_notifier/dist/OmniDeskNotifier.exe
        retention-days: 7

    - name: Create GitHub Release (main)
      if: github.ref_name == 'main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: notifier-v${{ steps.version.outputs.APP_VERSION }}
        name: Desktop Notifier v${{ steps.version.outputs.APP_VERSION }}
        body_path: deployment/docker/CHANGELOG.md
        files: desktop_notifier/dist/OmniDeskNotifier.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
