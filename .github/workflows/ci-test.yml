name: CI Tests

on:
  push:
    branches:
      - test
      - main
      - develop
  pull_request:
    branches:
      - test
      - main
      - develop

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('omni_desk_backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./omni_desk_backend
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage and JUnit output
        working-directory: ./omni_desk_backend
        env:
          PYTHONPATH: ${{ github.workspace }}
          DJANGO_SETTINGS_MODULE: omni_desk_backend.settings.test
        run: |
          pytest --ds=omni_desk_backend.settings.test \
            --cov=. --cov-report=xml --cov-report=term-missing \
            --junitxml=junit.xml -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: omni_desk_backend/coverage.xml
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: omni_desk_backend/junit.xml
          retention-days: 7

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./omni_desk_frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omni_desk_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --watchAll=false --coverage --coverageReporters=text --coverageReporters=clover --coverageReporters=json --coverageDirectory=coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: omni_desk_frontend/coverage/
          retention-days: 7
