name: GHCR Image Cleanup

on:
  schedule:
    - cron: '0 3 1 * *'  # 每月 1 日凌晨 3 点
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup old backend GHCR tags
        uses: actions/delete-package-versions@v4
        with:
          package-name: omni-desk-backend
          package-type: container
          keep-untagged-versions: false
          min-versions-to-keep-tagged: 0
          ignore-versions: |
            latest
            v*-alpha.*
            v*-beta.*
            v*-rc.*
            v[0-9]+.[0-9]+.[0-9]+
            *-canary
        continue-on-error: true

      - name: Cleanup old frontend GHCR tags
        uses: actions/delete-package-versions@v4
        with:
          package-name: omni-desk-frontend
          package-type: container
          keep-untagged-versions: false
          ignore-versions: |
            latest
            v*-alpha.*
            v*-beta.*
            v*-rc.*
            v[0-9]+.[0-9]+.[0-9]+
            *-canary
        continue-on-error: true