name: Run Tests, Build and Push Docker Images

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # 启动一个PostgreSQL数据库供后端测试使用
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 前端测试 ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: omni_desk_frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./omni_desk_frontend

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false
        working-directory: ./omni_desk_frontend

      # --- 后端测试 ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: omni_desk_backend/requirements-dev.txt

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: ./omni_desk_backend

      - name: Run Backend Tests
        run: pytest
        working-directory: ./omni_desk_backend
        env:
          # 将测试数据库连接到CI服务
          DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          # 其他必要的环境变量

  build-and-push:
    needs: test # 依赖测试任务成功
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/onemuggle/omni-desk-backend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/docker/omni_desk_backend/Dockerfile
          target: production
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/onemuggle/omni-desk-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=v${{ steps.read_version.outputs.VERSION }},enable={{is_default_branch}}
            type=raw,value=v${{ steps.read_version.outputs.VERSION }},enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./omni_desk_frontend
          file: ./omni_desk_frontend/Dockerfile
          push: ${{ github.event_name == 'push' }} # 仅在推送到main分支时发布
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CI=false