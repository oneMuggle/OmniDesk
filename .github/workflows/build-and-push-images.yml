name: Build and Push Docker Images

# Phase 8 optimization: Trigger only after CI workflow passes successfully,
# eliminating duplicate test runs (CI and this workflow both ran pytest).
# Falls back to manual_dispatch for ad-hoc image builds.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-and-push:
    # Only proceed if upstream CI succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version file
        id: read_version
        run: echo "VERSION=$(cat deployment/docker/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Detect release channel
        id: channel
        run: |
          case "${GITHUB_REF#refs/heads/}" in
            main)    echo "CHANNEL=alpha"   >> "$GITHUB_OUTPUT" ;;
            beta)    echo "CHANNEL=beta"    >> "$GITHUB_OUTPUT" ;;
            rc)      echo "CHANNEL=preview" >> "$GITHUB_OUTPUT" ;;
            release) echo "CHANNEL=stable"  >> "$GITHUB_OUTPUT" ;;
            *)       echo "CHANNEL=none"    >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Extract metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/onemuggle/omni-desk-backend
          tags: |
            type=sha
            type=raw,value=${{ steps.read_version.outputs.VERSION }},enable=${{ steps.channel.outputs.CHANNEL != 'none' }}
            type=raw,value=${{ steps.read_version.outputs.VERSION }}-canary,enable=${{ steps.channel.outputs.CHANNEL == 'none' && github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ steps.channel.outputs.CHANNEL == 'stable' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/docker/omni_desk_backend/Dockerfile
          target: production
          push: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/onemuggle/omni-desk-frontend
          tags: |
            type=sha
            type=raw,value=${{ steps.read_version.outputs.VERSION }},enable=${{ steps.channel.outputs.CHANNEL != 'none' }}
            type=raw,value=${{ steps.read_version.outputs.VERSION }}-canary,enable=${{ steps.channel.outputs.CHANNEL == 'none' && github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ steps.channel.outputs.CHANNEL == 'stable' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./omni_desk_frontend
          file: ./omni_desk_frontend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CI=false
