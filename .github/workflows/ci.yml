name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linter
        run: pip install ruff
      - name: Ruff check
        continue-on-error: true
        run: ruff check omni_desk_backend/
      - name: Ruff format check
        continue-on-error: true
        run: ruff format --check omni_desk_backend/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r omni_desk_backend/requirements-dev.txt
      - name: Run tests with coverage
        working-directory: omni_desk_backend
        run: |
          pytest --cov=. --cov-fail-under=60 --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: omni_desk_backend/coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit safety
      - name: Bandit scan
        continue-on-error: true
        run: bandit -r omni_desk_backend/ -ll --skip B101
      - name: Dependency check
        run: safety check -r omni_desk_backend/requirements-prod.txt

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install mypy
        run: pip install mypy types-requests types-redis types-python-dateutil
      - name: Type check
        continue-on-error: true
        working-directory: omni_desk_backend
        run: mypy . --ignore-missing-imports
