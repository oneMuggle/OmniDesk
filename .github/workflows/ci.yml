name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ───
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linter
        run: pip install ruff
      - name: Ruff check
        run: ruff check omni_desk_backend/
      - name: Ruff format check
        run: ruff format --check omni_desk_backend/

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('omni_desk_backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r omni_desk_backend/requirements-dev.txt
      - name: Run tests with coverage
        working-directory: omni_desk_backend
        run: |
          pytest --cov=. --cov-fail-under=60 --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: omni_desk_backend/coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit safety
      - name: Bandit scan
        run: bandit -r omni_desk_backend/ -ll --skip B101
      - name: Dependency check
        run: safety scan -r omni_desk_backend/requirements-prod.txt

  # ─── Frontend ───
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./omni_desk_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: omni_desk_frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./omni_desk_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: omni_desk_frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --watchAll=false --coverage

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./omni_desk_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: omni_desk_frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
