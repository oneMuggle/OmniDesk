name: Deploy to Windows Server via SSH

on:
  workflow_run:
    workflows: ["Run Tests, Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set "PROJECT_DIR=C:\projects\omni-desk"
            if not exist "%PROJECT_DIR%" (
              git clone https://github.com/onemuggle/calendar.git "%PROJECT_DIR%"
            )
            cd /d "%PROJECT_DIR%" && git pull && set BACKEND_IMAGE_TAG=${{ github.sha }} && set FRONTEND_IMAGE_TAG=${{ github.sha }} && docker-compose -f deployment/docker/docker-compose.prod.yml pull && docker-compose -f deployment/docker/docker-compose.prod.yml up -d