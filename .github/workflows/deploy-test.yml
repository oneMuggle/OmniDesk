name: Deploy Test

on:
  workflow_run:
    workflows: ["Run Tests, Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
      - develop

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Build backend image locally
        # deploy-test 在 workflow_run 触发的 job 中 GITHUB_TOKEN 没有 packages:read scope,
        # 无法拉取 GHCR 镜像。改为本地 build + tag 成 GHCR 全名,
        # 让 offline.yml 用本地镜像 (pull_policy: missing 允许 fallback)。
        # 镜像 tag 锁死 v0.2.0(与 .env.production.example 的 BACKEND_IMAGE_TAG 默认值一致)
        run: |
          docker build \
            -f deployment/docker/omni_desk_backend/Dockerfile \
            --target production \
            --platform linux/amd64 \
            -t ghcr.io/onemuggle/omni-desk-backend:v0.2.0 \
            .

      - name: Build frontend image locally
        run: |
          docker build \
            -f omni_desk_frontend/Dockerfile \
            --target production \
            --platform linux/amd64 \
            -t ghcr.io/onemuggle/omni-desk-frontend:v0.2.0 \
            omni_desk_frontend/

      - name: Create .env.production for CI
        working-directory: ./deployment/docker
        run: |
          # Generate a temporary .env.production for CI testing
          cp .env.production.example .env.production
          SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(50))")
          sed -i "s/POSTGRES_USER=.*/POSTGRES_USER=testuser/" .env.production
          sed -i "s/POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=testpass123/" .env.production
          sed -i "s/SECRET_KEY=.*/SECRET_KEY=$SECRET_KEY/" .env.production
          sed -i "s/REDIS_PASSWORD=.*/REDIS_PASSWORD=redispass123/" .env.production
          sed -i "s/DJANGO_ALLOWED_HOSTS=.*/DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1/" .env.production
          sed -i "s/CORS_ALLOWED_ORIGINS=.*/CORS_ALLOWED_ORIGINS=http:\/\/localhost/" .env.production
          sed -i "s/CSRF_TRUSTED_ORIGINS=.*/CSRF_TRUSTED_ORIGINS=http:\/\/localhost/" .env.production
          echo "Generated .env.production for CI"

      - name: Start services
        working-directory: ./deployment/docker
        run: |
          # 临时把 backend/frontend 的 pull_policy 从 'never' 改为 'missing',
          # 让 deploy test runner 在本地无镜像时从 GHCR 拉取(已 login)
          # (本 job 已经在前面步骤本地 build 了镜像,所以会优先用本地)
          sed -i 's|pull_policy: never|pull_policy: missing|g' docker-compose.offline.yml
          docker compose -f docker-compose.offline.yml up -d
          echo "Waiting for services to be healthy..."
          timeout 300 bash -c '
            while true; do
              healthy=true
              for svc in backend frontend; do
                state=$(docker compose -f docker-compose.offline.yml ps -q $svc 2>/dev/null | xargs -I{} docker inspect --format="{{.State.Status}}" {} 2>/dev/null)
                if [ "$state" != "running" ]; then
                  healthy=false
                  break
                fi
              done
              if [ "$healthy" = true ]; then
                echo "All services are running"
                break
              fi
              sleep 5
            done
          '

      - name: Run deploy tests
        working-directory: ./deployment/docker
        run: |
          chmod +x deploy_tests.sh
          ./deploy_tests.sh http://localhost

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: deploy-test-results
          path: deployment/docker/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        working-directory: ./deployment/docker
        run: |
          docker compose -f docker-compose.offline.yml down -v
          echo "Services stopped and volumes removed"
