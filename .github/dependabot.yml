# Dependabot 配置
# 自动检查依赖更新和安全漏洞

version: 2
updates:
  # npm 前端依赖
  - package-ecosystem: "npm"
    directory: "/omni_desk_frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"

  # pip 后端依赖
  - package-ecosystem: "pip"
    directory: "/omni_desk_backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

# 安全更新
security-updates:
  - package-ecosystem: "npm"
    directory: "/omni_desk_frontend"
    schedule:
      interval: "daily"
    labels:
      - "security"
      - "npm"

  - package-ecosystem: "pip"
    directory: "/omni_desk_backend"
    schedule:
      interval: "daily"
    labels:
      - "security"
      - "python"
