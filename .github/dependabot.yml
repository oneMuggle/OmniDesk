# Dependabot 配置 - 依赖安全扫描
# 请在 GitHub 仓库设置中启用 Dependabot

version: 2
updates:
  # 启用 npm 依赖安全扫描
  - package-ecosystem: "npm"
    directory: "/omni_desk_frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # 启用 GitHub Actions 更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"

  # 启用 Docker 依赖扫描
  - package-ecosystem: "docker"
    directory: "/deployment/docker/omni_desk_backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "docker"
