version: '3.8'

services:
  frontend:
    image: ${DOCKER_USER}/calendar-frontend:${FRONTEND_VERSION}
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    volumes:
      - ./volumes/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  backend:
    image: ${DOCKER_USER}/calendar-backend:${BACKEND_VERSION}
    user: root
    command: bash -c "python manage.py migrate && python /app/init_superuser.py && python -m waitress --port=8000 DRFForVue.wsgi:application"
    ports:
      - "8000:8000"
    volumes:
      - ./volumes/uploads:/app/uploads
      - ./volumes/data:/app/data
      - ./volumes/static:/app/staticfiles
    environment:
      - DJANGO_ENV=production
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=!@#django-insecure-9g_8=0q^fz$3k&9m6v%_wx@7t6r4b5y_u*8h7=+!k
      - DJANGO_SETTINGS_MODULE=DRFForVue.settings
      - SUPERUSER_NAME=admin
      - SUPERUSER_EMAIL=admin@example.com
      - SUPERUSER_PASSWORD=ChangeMe123!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:13
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./volumes/static:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
