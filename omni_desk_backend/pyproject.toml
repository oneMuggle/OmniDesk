[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["*/migrations/*", "*/test_*.py", "*/tests/*", "*/tests.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = [
    "E501",      # line length handled by formatter
    "F403",      # star imports from settings (intentional)
    "F405",      # undefined from star imports
    # Django/DRF class attributes (Meta, permission_classes, etc.) are safe mutable defaults
    "RUF012",
    # Chinese comments contain fullwidth punctuation — intentional for Chinese project
    "RUF002",
    "RUF003",
    # Style suggestions — keep existing code style
    "SIM108",
    "SIM114",
    "RUF005",
    # `raise ... from` in except — fix later, not CI-blocking
    "B904",
    # super(__class__, self) — legacy Django compat
    "UP008",
    # Import sorting edge cases
    "I001",
    # Chinese user-facing strings contain fullwidth punctuation — intentional
    "RUF001",
    # Unused local variables / loop vars — fix later
    "F841",
    "B007",
    # Import not at top (sys.path manipulation in management commands)
    "E402",
    # datetime.timezone.utc → datetime.UTC — minor modernization
    "UP017",
    # warnings.warn stacklevel — noisy
    "B028",
    # Implicit Optional in type hints — large refactor to fix
    "RUF013",
    # Style: use all() instead of for loop — fine as-is
    "SIM110",
    "SIM102",
    # `__all__` not sorted — cosmetic
    "RUF022",
    # f-string without placeholders
    "F541",
    # Function doesn't bind loop variable (closures)
    "B023",
    # Redefinition of unused (get_user_model shadows import)
    "F811",
    # Use explicit conversion flag
    "RUF010",
    # Prefer next(iter()) over single element slice
    "RUF015",
    # Replace yield over for loop with yield from — minor
    "UP028",
    # Unused unpacked variables (update_or_create returns)
    "RUF059",
]

[tool.ruff.lint.per-file-ignores]
"omni_desk_backend/settings/*.py" = ["F403", "F405", "E402"]
# Re-export modules — imports are for public API, not internal use
"users/serializers.py" = ["F401"]
"users/user_serializers.py" = ["F401"]
"events/views.py" = ["F401"]
"events/serializers.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["omni_desk_backend"]
