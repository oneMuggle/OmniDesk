version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx_config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_config/sites-enabled:/etc/nginx/sites-enabled:ro
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"