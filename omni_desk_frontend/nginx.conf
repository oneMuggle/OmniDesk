server {
    listen 80;
    server_name localhost;

    # 优化客户端请求体大小和超时设置
    client_max_body_size 20M;
    keepalive_timeout 65;

    # 注:本文件被复制到 /etc/nginx/conf.d/default.conf (server context),
    #     limit_req_zone 必须在 http context 定义,所以此处不做限流配置。
    #     如需限流,需单独 COPY 一份到 /etc/nginx/nginx.conf http 块中。

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-UA-Compatible "IE=edge,chrome=1" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # Django 静态文件服务 (例如 Admin 后台)
    location /django-static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 媒体文件服务
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 前端React应用
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django Admin 的反向代理
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

}

