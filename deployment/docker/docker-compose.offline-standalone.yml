# Standalone offline deployment — no merge with docker-compose.yml
# Used with: docker compose -f docker-compose.offline-standalone.yml --env-file .env.production up -d

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  db:
    image: postgres:14.2
    command: postgres -c listen_addresses='*'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - omni_desk

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - omni_desk

  backend:
    image: omni-desk-backend-prod:latest
    <<: *common-env
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni_desk

  frontend:
    image: omni-desk-frontend-prod:latest
    ports:
      - "80:80"
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - omni_desk

  worker:
    image: omni-desk-backend-prod:latest
    <<: *common-env
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni_desk

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  omni_desk:
    driver: bridge
