# Offline deployment — self-contained compose, no merge with dev base
# Used with: docker compose -f docker-compose.offline.yml --env-file .env.production up -d
#
# 镜像命名与 GHCR 一致 (ghcr.io/onemuggle/omni-desk-{backend,frontend})
# 默认 tag v0.2.0 来自 .env.production.example,可被 BACKEND_IMAGE_TAG /
# FRONTEND_IMAGE_TAG 环境变量覆盖。pull_policy: never 防止误去 docker hub 拉取。
#
# 离线包通过 build_and_export.sh 在 docker save/load 后用 docker tag 重命名:
#   docker tag omni-desk-backend-prod:v0.2.0  ghcr.io/onemuggle/omni-desk-backend:v0.2.0
#   docker tag omni-desk-frontend-prod:v0.2.0 ghcr.io/onemuggle/omni-desk-frontend:v0.2.0

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  db:
    image: postgres:14-alpine
    command: postgres -c listen_addresses='*'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - omni_desk
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      # SECURITY: Use CMD-SHELL with REDISCLI_AUTH env var to avoid password exposure in process list
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - omni_desk
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:-v0.4.0}
    pull_policy: never
    <<: *common-env
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
      - COLLECT_STATIC=true
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
      - backup_volume:/usr/src/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - omni_desk
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    image: ghcr.io/onemuggle/omni-desk-frontend:${FRONTEND_IMAGE_TAG:-v0.4.0}
    pull_policy: never
    ports:
      - "80:80"
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - omni_desk
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  worker:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:-v0.4.0}
    pull_policy: never
    <<: *common-env
    # SKIP_MIGRATE=true:worker 不跑 migrate,避免与 backend 容器并发触发 UniqueViolation
    environment:
      - SKIP_MIGRATE=true
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import subprocess; subprocess.run(['celery', '-A', 'omni_desk_backend', 'status'], check=True, capture_output=True, timeout=10)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - omni_desk
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  backup_volume:

networks:
  omni_desk:
    driver: bridge
