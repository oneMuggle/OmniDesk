# Offline deployment override — use with: docker compose -f docker-compose.yml -f docker-compose.offline.yml --env-file .env.production up -d
# Image names match what docker load produces (see deploy_offline.sh)

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:14.2
    command: postgres -c listen_addresses='*'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    ports: []
    networks:
      - omni_desk

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    pull_policy: never
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    ports: []
    networks:
      - omni_desk

  # ── Backend ────────────────────────────────────────────────────
  backend:
    image: omni-desk-backend-prod:v0.2.0
    pull_policy: never
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-env

  # ── Frontend (Nginx, single HTTP entry point :80) ─────────────
  frontend:
    image: omni-desk-frontend-prod:v0.2.0
    pull_policy: never
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - omni_desk

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    image: omni-desk-backend-prod:v0.2.0
    pull_policy: never
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-env

volumes:
  redis_data:

networks:
  omni_desk:
    driver: bridge
