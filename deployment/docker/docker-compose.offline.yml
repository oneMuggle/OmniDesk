# Offline deployment compose override
# Used with: docker compose -f docker-compose.yml -f docker-compose.offline.yml --env-file .env.production up -d
# Image names MUST match what docker load produces (see deploy_offline.sh)

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  db:
    image: postgres:14.2
    command: postgres -c listen_addresses='*'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - omni_desk

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - omni_desk

  backend:
    image: omni-desk-backend-prod:latest
    <<: *common-env
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni_desk

  frontend:
    image: omni-desk-frontend-prod:latest
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - omni_desk

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - omni_desk

  worker:
    image: omni-desk-backend-prod:latest
    <<: *common-env
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omni_desk

volumes:
  redis_data:

networks:
  omni_desk:
    driver: bridge
