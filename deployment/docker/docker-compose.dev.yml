version: '3.8'

services:
  db:
    image: postgres:13-alpine
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=devdb

  redis:
    image: redis:6-alpine

  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile.dev
    volumes:
      - ../../omni_desk_backend:/app
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ../../omni_desk_frontend:/app
    ports:
      - "3000:3000"

volumes:
  postgres_data_dev: