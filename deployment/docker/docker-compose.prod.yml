version: '3.8'

services:
  db:
    image: postgres:13-alpine
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data/
    env_file:
      - .env.production

  redis:
    image: redis:6-alpine

  omni_desk_backend:
    image: ghcr.io/your-username/omni_desk_backend:${BACKEND_IMAGE_TAG:-latest}
    depends_on:
      - db
      - redis
    env_file:
      - .env.production

  omni_desk_frontend:
    image: ghcr.io/your-username/omni_desk_frontend:${FRONTEND_IMAGE_TAG:-latest}
    ports:
      - "80:80"

volumes:
  postgres_data_prod: