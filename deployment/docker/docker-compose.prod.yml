# Production override — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: []
    networks:
      - omni_desk

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports: []
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    networks:
      - omni_desk

  # ── Backend (Django/Gunicorn) ──────────────────────────────────
  backend:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
    command: gunicorn omni_desk_backend.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --access-logfile -
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *common-env

  # ── Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    image: ghcr.io/onemuggle/omni-desk-frontend:${FRONTEND_IMAGE_TAG:?FRONTEND_IMAGE_TAG is required}
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - omni_desk

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    command: celery -A omni_desk_backend worker -l info
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c "import subprocess; subprocess.run(['celery', '-A', 'omni_desk_backend', 'status'], check=True, capture_output=True, timeout=10)" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    <<: *common-env

volumes:
  redis_data:

networks:
  omni_desk:
    driver: bridge
