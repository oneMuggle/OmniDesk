version: '3.8'

services:
  db:
    image: postgres:13-alpine
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data/
    env_file:
      - .env.production

  redis:
    image: redis:6-alpine

  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile.prod
    depends_on:
      - db
      - redis
    env_file:
      - .env.production

  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"

volumes:
  postgres_data_prod: