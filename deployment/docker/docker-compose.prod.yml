# Production override — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d

x-common-env: &common-env
  env_file:
    - ./.env.production

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports: []
    networks:
      - omni_desk

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports: []
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    networks:
      - omni_desk

  # ── Backend (Django/Gunicorn) ──────────────────────────────────
  backend:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    ports:
      - "${TEST_BACKEND_PORT:-8000}:8000"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings.production
      - DJANGO_ENV=production
    command: gunicorn omni_desk_backend.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --access-logfile -
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - omni_desk
    <<: *common-env

  # ── Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    image: ghcr.io/onemuggle/omni-desk-frontend:${FRONTEND_IMAGE_TAG:?FRONTEND_IMAGE_TAG is required}
    ports:
      - "${TEST_FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - omni_desk

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    image: ghcr.io/onemuggle/omni-desk-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    # SKIP_MIGRATE=true:worker 不跑 migrate,避免与 backend 容器并发触发 UniqueViolation
    environment:
      - SKIP_MIGRATE=true
    command: celery -A omni_desk_backend worker -l info
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import subprocess; subprocess.run(['celery', '-A', 'omni_desk_backend', 'status'], check=True, capture_output=True, timeout=10)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - omni_desk
    <<: *common-env

volumes:
  redis_data:

networks:
  omni_desk:
    driver: bridge
