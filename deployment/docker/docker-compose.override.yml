services:
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
    volumes:
      - ../../omni_desk_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../../omni_desk_frontend:/app
      - node_modules_volume:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./.env

  worker:
    build:
      context: ../..
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
      target: development
    volumes:
      - ../../omni_desk_backend:/app
    env_file:
      - ./.env

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/usr/src/app/staticfiles

volumes:
  node_modules_volume: