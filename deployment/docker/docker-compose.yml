services:
  db:
    image: postgres:14.2
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-omni_desk}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-omni_desk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${REGISTRY:-local}/omni-desk-backend:${TAG:-latest}
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings
      - DJANGO_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile
    image: ${REGISTRY:-local}/omni-desk-frontend:${TAG:-latest}
    ports:
      - "80:80"
    volumes:
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    image: ${REGISTRY:-local}/omni-desk-backend:${TAG:-latest}
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings
      - DJANGO_ENV=production
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume: