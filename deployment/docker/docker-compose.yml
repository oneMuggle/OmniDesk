# OmniDesk Docker Compose — 统一版
#
# 使用方式：
#   开发环境: docker compose up -d (自动加载 .env)
#   生产环境: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
#   离线部署: docker compose -f docker-compose.yml -f docker-compose.offline.yml --env-file .env.production up -d
#   仅构建:   docker compose build  (或 docker compose build --no-cache)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXPOSE_PORT:-}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (Django/Gunicorn) ──────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
      target: ${BUILD_TARGET:-development}
    volumes:
      - ../../omni_desk_backend:/app
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    ports:
      - "${TEST_BACKEND_PORT:-8000}:8000"
    env_file:
      - ./.env
    environment:
      - PAPERLESS_URL=http://paperless:8000
      - PAPERLESS_API_TOKEN=${PAPERLESS_API_TOKEN:-}
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React CRA dev) ───────────────────────────────────
  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../../omni_desk_frontend:/app
      # 匿名 volume:每次容器创建从 image 的 /app/node_modules 拷贝,
      # 保证 image (npm ci) 与运行时一致,避免旧 named volume 导致"vite not found"。
      - /app/node_modules
    ports:
      - "${TEST_FRONTEND_PORT:-3000}:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://backend:8000
    env_file:
      - ./.env

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
      target: development
    volumes:
      - ../../omni_desk_backend:/app
    env_file:
      - ./.env
    # SKIP_MIGRATE=true:worker 不跑 migrate,避免与 backend 容器并发触发 UniqueViolation
    environment:
      - SKIP_MIGRATE=true
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  # ── paperless-ngx ─────────────────────────────────────────────────
  # 独立文档管理服务;与 OmniDesk 后端通过 HTTP 通信(Token 认证)
  # 首次启动前需在 .env 中配置:PAPERLESS_SECRET_KEY / PAPERLESS_DB_PASSWORD / PAPERLESS_API_TOKEN
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_DBHOST=paperless-db
      - PAPERLESS_DBPORT=5432
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASSWORD:?PAPERLESS_DB_PASSWORD is required}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY:?PAPERLESS_SECRET_KEY is required}
      - PAPERLESS_TIME_ZONE=${TZ:-Asia/Shanghai}
      - PAPERLESS_OCR_LANGUAGES=chi_sim+eng
      - PAPERLESS_PORT=8000
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
    ports:
      - "${PAPERLESS_EXPOSE_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── paperless PostgreSQL ─────────────────────────────────────────
  paperless-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASSWORD:?PAPERLESS_DB_PASSWORD is required}
    volumes:
      - paperless-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless -d paperless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── paperless Redis ──────────────────────────────────────────────
  paperless-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  static_volume:
  media_volume:
  paperless-data:
  paperless-media:
  paperless-db:
