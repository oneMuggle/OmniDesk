# OmniDesk Docker Compose — 统一版
#
# 使用方式：
#   开发环境: docker compose up -d (自动加载 .env)
#   生产环境: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
#   离线部署: docker compose -f docker-compose.yml -f docker-compose.offline.yml --env-file .env.production up -d
#   仅构建:   docker compose build  (或 docker compose build --no-cache)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXPOSE_PORT:-}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (Django/Gunicorn) ──────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
      target: ${BUILD_TARGET:-development}
    volumes:
      - ../../omni_desk_backend:/app
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React CRA dev) ───────────────────────────────────
  frontend:
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../../omni_desk_frontend:/app
      # 匿名 volume:每次容器创建从 image 的 /app/node_modules 拷贝,
      # 保证 image (npm ci) 与运行时一致,避免旧 named volume 导致"vite not found"。
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./.env

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
      target: development
    volumes:
      - ../../omni_desk_backend:/app
    env_file:
      - ./.env
    command: celery -A omni_desk_backend worker -l info
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
