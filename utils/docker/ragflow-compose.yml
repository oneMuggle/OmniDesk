version: '3.8'

services:
  ragflow:
    image: ragflow/ragflow:latest # Placeholder for Ragflow image
    container_name: ragflow_app
    environment:
      # Ragflow 环境变量
      # ... 根据 Ragflow 文档配置
    volumes:
      - ragflow_data:/app/data # For Ragflow data persistence
    expose:
      - 80 # Assuming Ragflow listens on port 80 internally
    restart: unless-stopped
    networks:
      - omni_desk_network

volumes:
  ragflow_data:

networks:
  omni_desk_network:
    name: omni_desk_network
    external: true