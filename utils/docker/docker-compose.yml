version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: omni_desk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-omni_desk}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTES_PASSWORD:-password}
    ports:
      - "5433:5432"
    command: postgres -c listen_addresses='*'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-omni_desk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omni_desk_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${DOCKER_USER:-defaultuser}/omni-desk-backend:${BACKEND_VERSION:-latest}
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
    container_name: omni_desk_backend
    command: gunicorn --chdir /usr/src/app omni_desk_backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ../../omni_desk_backend:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../deployment/docker/.env
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings
      - DJANGO_ENV=production
    restart: unless-stopped

  frontend:
    image: ${DOCKER_USER:-defaultuser}/omni-desk-frontend:${FRONTEND_VERSION:-latest}
    build:
      context: ../../omni_desk_frontend
      dockerfile: Dockerfile
    container_name: omni_desk_frontend
    expose:
      - 80 # Frontend will be exposed via Nginx
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Use new Nginx config
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    image: ${DOCKER_USER:-defaultuser}/omni-desk-backend:${BACKEND_VERSION:-latest}
    build:
      context: ../../
      dockerfile: deployment/docker/omni_desk_backend/Dockerfile
    container_name: omni_desk_worker
    command: celery -A omni_desk_backend worker -l info
    volumes:
      - ../../omni_desk_backend:/usr/src/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - ../../deployment/docker/.env
    environment:
      - DJANGO_SETTINGS_MODULE=omni_desk_backend.settings
      - DJANGO_ENV=production
    restart: unless-stopped

  dify:
    image: langchain/dify:latest # Placeholder for Dify image
    container_name: dify_app
    environment:
      # Dify 环境变量
      - DB_URL=postgresql://user:password@db:5432/dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # ... 其他 Dify 环境变量
    volumes:
      - dify_data:/app/data # For Dify data persistence
    expose:
      - 80 # Assuming Dify listens on port 80 internally
    depends_on:
      - db
      - redis
    restart: unless-stopped

  ragflow:
    image: ragflow/ragflow:latest # Placeholder for Ragflow image
    container_name: ragflow_app
    environment:
      # Ragflow 环境变量
      # ... 根据 Ragflow 文档配置
    volumes:
      - ragflow_data:/app/data # For Ragflow data persistence
    expose:
      - 80 # Assuming Ragflow listens on port 80 internally
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: combined_nginx
    ports:
      - "80:80" # Expose Nginx on port 80
      - "443:443" # For HTTPS, if needed
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount the new Nginx config
      - ../../omni_desk_frontend/build:/usr/share/nginx/html:ro # Mount frontend build
    depends_on:
      - frontend
      - backend
      - dify
      - ragflow
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  dify_data:
  ragflow_data: