version: '3.8'

services:
  dify:
    image: langchain/dify:latest # Placeholder for Dify image
    container_name: dify_app
    environment:
      # Dify 环境变量
      - DB_URL=postgresql://user:password@db:5432/dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # ... 其他 Dify 环境变量
    volumes:
      - dify_data:/app/data # For Dify data persistence
    expose:
      - 80 # Assuming Dify listens on port 80 internally
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - omni_desk_network

volumes:
  dify_data:

networks:
  omni_desk_network:
    name: omni_desk_network
    external: true